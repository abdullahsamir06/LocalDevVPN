name: Build LocalDevVPN

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: List Available Destinations (Debug)
        run: xcodebuild -project LocalDevVPN.xcodeproj -scheme LocalDevVPN -showdestinations

      - name: Build App Binary
        run: |
          mkdir -p build
          # We use -sdk iphoneos and a simplified destination
          # We keep || true because intermediate tool failures (actool) are expected
          xcodebuild build \
            -project LocalDevVPN.xcodeproj \
            -scheme LocalDevVPN \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ASSETCATALOG_COMPILER_SKIP_APP_SPECIFIC_COMPILATION=YES \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            ASSETCATALOG_COMPILER_LAUNCHEXT=none \
            VALIDATE_ASSETS=NO \
            ENABLE_PREVIEWS=NO \
            | tee build.log || true
          
          # Check if the .app folder was produced regardless of exit code
          APP_PATH=$(find build/DerivedData -name "LocalDevVPN.app" -type d | grep -v "Index" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL FAILURE: Build failed to produce .app bundle. Check build.log above."
            exit 1
          fi

      - name: Prepare IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/DerivedData -name "LocalDevVPN.app" -type d | grep -v "Index" | head -n 1)
          echo "Found App at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # Clean up any partial signatures
          find Payload/LocalDevVPN.app -name "_CodeSignature" -exec rm -rf {} +
          
          # Sign for jailbreak/TrollStore usage
          find Payload/LocalDevVPN.app -type f -perm +111 -exec ldid -S {} +
          
          zip -r LocalDevVPN.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalDevVPN-IPA
          path: LocalDevVPN.ipa
