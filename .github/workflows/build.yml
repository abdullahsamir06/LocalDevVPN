name: Build LocalDevVPN

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build App Binary
        run: |
          mkdir -p build
          xcodebuild build \
            -project LocalDevVPN.xcodeproj \
            -scheme LocalDevVPN \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ASSETCATALOG_COMPILER_SKIP_APP_SPECIFIC_COMPILATION=YES \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            VALIDATE_ASSETS=NO \
            ENABLE_PREVIEWS=NO

      - name: Prepare IPA
        run: |
          mkdir -p Payload
          # Locate the .app folder inside the Build/Products directory of DerivedData
          APP_PATH=$(find build/DerivedData/Build/Products -name "LocalDevVPN.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find LocalDevVPN.app"
            # Debug: list what was actually built
            find build/DerivedData/Build/Products -maxdepth 2
            exit 1
          fi
          
          echo "Found App at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # Sign main binary and the Network Extension
          # We use a wildcard to ensure both the app and any included appex are covered
          find Payload/LocalDevVPN.app -type f -perm +111 -exec ldid -S {} +
          
          zip -r LocalDevVPN.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalDevVPN-IPA
          path: LocalDevVPN.ipa
