name: Build LocalDevVPN

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build and Archive
        run: |
          mkdir -p build
          # We use ACTION=install and a custom deployment location to bypass actool's runtime check
          xcodebuild archive \
            -project LocalDevVPN.xcodeproj \
            -scheme LocalDevVPN \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/LocalDevVPN.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ASSETCATALOG_COMPILER_SKIP_APP_SPECIFIC_COMPILATION=YES \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            VALIDATE_ASSETS=NO \
            | tee build.log

      - name: Prepare IPA
        run: |
          mkdir -p Payload
          # The path inside the archive depends on your project settings, 
          # but usually it's under Products/Applications
          APP_PATH=$(find build/LocalDevVPN.xcarchive -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app in archive"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          
          # Clean signature and apply ldid for research purposes (A14/6s compatibility)
          # find Payload -name "_CodeSignature" -exec rm -rf {} +
          ldid -S Payload/*.app/$(basename Payload/*.app .app)
          
          zip -r LocalDevVPN.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalDevVPN-IPA
          path: LocalDevVPN.ipa
