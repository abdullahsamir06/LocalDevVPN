name: Build LocalDevVPN

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build XCArchive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project LocalDevVPN.xcodeproj \
            -scheme LocalDevVPN \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/LocalDevVPN.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            ASSETCATALOG_COMPILER_SKIP_APP_SPECIFIC_COMPILATION=YES \
            VALIDATE_ASSETS=NO \
            | tee build.log

      - name: Prepare Payload
        run: |
          mkdir -p Payload
          cp -r build/LocalDevVPN.xcarchive/Products/Applications/LocalDevVPN.app Payload/
          # Ensure ldid is applied if you need to bypass Apple's signature for jailbreak/TrollStore
          ldid -S Payload/LocalDevVPN.app/LocalDevVPN
          zip -r LocalDevVPN.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalDevVPN-IPA
          path: LocalDevVPN.ipa
