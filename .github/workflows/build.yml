name: Build LocalDevVPN

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build App Binary
        run: |
          mkdir -p build
          # Using 'build' instead of 'archive' to bypass strict asset validation
          xcodebuild build \
            -project LocalDevVPN.xcodeproj \
            -scheme LocalDevVPN \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ASSETCATALOG_COMPILER_SKIP_APP_SPECIFIC_COMPILATION=YES \
            VALIDATE_ASSETS=NO

      - name: Prepare IPA
        run: |
          mkdir -p Payload
          # Locate the .app folder inside DerivedData
          APP_PATH=$(find build/DerivedData -name "LocalDevVPN.app" -type d | grep -v "Index" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find LocalDevVPN.app"
            exit 1
          fi
          
          echo "Found App at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # Apply ldid signature to the main binary and any extensions
          # This allows the app to run on jailbroken/TrollStore devices
          find Payload/LocalDevVPN.app -name "TunnelProv" -exec ldid -S {} +
          ldid -S Payload/LocalDevVPN.app/LocalDevVPN
          
          zip -r LocalDevVPN.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalDevVPN-IPA
          path: LocalDevVPN.ipa
