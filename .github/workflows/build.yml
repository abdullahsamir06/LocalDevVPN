name: Build LocalDevVPN

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build App Binary
        run: |
          mkdir -p build
          xcodebuild build \
            -project LocalDevVPN.xcodeproj \
            -scheme LocalDevVPN \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ASSETCATALOG_COMPILER_SKIP_APP_SPECIFIC_COMPILATION=YES \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            ASSETCATALOG_COMPILER_LAUNCHEXT=none \
            COMPILER_INDEX_STORE_ENABLE=NO \
            VALIDATE_ASSETS=NO \
            ENABLE_PREVIEWS=NO \
            | tee build.log || true

      - name: Assemble and Sign IPA
        run: |
          mkdir -p Payload
          
          # 1. Find the main App
          APP_PATH=$(find build/DerivedData -name "LocalDevVPN.app" -type d | grep -v "Index" | head -n 1)
          cp -r "$APP_PATH" Payload/
          TARGET_APP="Payload/LocalDevVPN.app"

          # 2. Manually find and inject Network Extensions (PlugIns)
          mkdir -p "$TARGET_APP/PlugIns"
          find build/DerivedData -name "*.appex" -type d -exec cp -r {} "$TARGET_APP/PlugIns/" \;

          # 3. Manually find and inject Frameworks
          mkdir -p "$TARGET_APP/Frameworks"
          find build/DerivedData -name "*.framework" -type d -exec cp -r {} "$TARGET_APP/Frameworks/" \;
          
          # 4. Cleanup and Signing
          # Remove code signatures that might have been partially generated
          find Payload -name "_CodeSignature" -exec rm -rf {} +
          
          # Use ldid on everything inside the bundle
          # This ensures the Extension and Frameworks are pseudo-signed
          find Payload -type f -perm +111 -exec ldid -S {} +
          
          zip -r LocalDevVPN.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalDevVPN-IPA
          path: LocalDevVPN.ipa
