name: Build IPA with Fake Signing
on:
    push:
        branches: [main]
    workflow_dispatch:
jobs:
    build:
        runs-on: macos-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install ldid
              run: brew install ldid

            - name: Select Xcode version
              run: sudo xcode-select -s /Applications/Xcode_16.2.app

            - name: Build Xcode Archive
              run: |
                  # Explicitly create build dir for logs
                  mkdir -p build
                  set -o pipefail
                  
                  xcodebuild archive \
                    -project LocalDevVPN.xcodeproj \
                    -scheme LocalDevVPN \
                    -destination 'generic/platform=iOS' \
                    -archivePath build/LocalDevVPN.xcarchive \
                    CODE_SIGN_IDENTITY="" \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGNING_ALLOWED=NO \
                    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
                    VALIDATE_ASSETS=NO \
                    2>&1 | tee build.log
                  
                  echo "=== ERRORS ==="
                  grep "error:" build.log || true

            - name: List build output
              if: always()
              run: |
                  echo "=== build/ contents ==="
                  ls -R build/ || echo "build/ does not exist"

            - name: Create Payload directory
              run: mkdir -p Payload

            - name: Copy App to Payload
              run: |
                  APP_PATH=$(find build/LocalDevVPN.xcarchive -name "*.app" -type d | head -n 1)
                  if [ -z "$APP_PATH" ]; then
                    echo "Error: Could not find .app in archive. Build likely failed."
                    exit 1
                  fi
                  echo "Found app at: $APP_PATH"
                  cp -R "$APP_PATH" Payload/

            - name: Find and Sign App Extension
              run: |
                  # Find all appex files and sign them
                  find Payload/ -name "*.appex" | while read APPEX_PATH; do
                    echo "Found App Extension at: $APPEX_PATH"
                    # Using ldid with the entitlements file from your workspace
                    ldid -S"${GITHUB_WORKSPACE}/TunnelProv/TunnelProv.entitlements" "$APPEX_PATH/$(basename "$APPEX_PATH" .appex)"
                    echo "Signed $APPEX_PATH"
                  done

            - name: Sign Main App Bundle
              run: |
                  # Find the main executable in the copied app bundle
                  APP_NAME=$(ls Payload/ | grep ".app")
                  APP_BINARY_PATH="Payload/$APP_NAME/${APP_NAME%.app}"
                  echo "Signing binary at: $APP_BINARY_PATH"
                  ldid -S"${GITHUB_WORKSPACE}/LocalDevVPN/LocalDevVPN.entitlements" "$APP_BINARY_PATH"
                  echo "Signed Main App Bundle."

            - name: Create IPA
              run: |
                  zip -r ./LocalDevVPN-fakesigned.ipa Payload

            - name: Upload IPA Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: LocalDevVPN-fakesigned-IPA
                  path: LocalDevVPN-fakesigned.ipa
